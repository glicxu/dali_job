[config file]
; Keep this path aligned with the local DaliConfigFile checkout.
; The included file provides shared Dalifin defaults such as MySQL credentials,
; ports, logging, and service host aliases. Values below override it for DaliJob.
app_common = B:\src\workspaces\DaliConfigFile\win_config\win_app_prod_common.ini


[dali_job]
env = local
host = 127.0.0.1
port = 5010
log_level = debug
client_origins = http://localhost:3000,http://127.0.0.1:3000
auth_mode = local


[dali_job_auth]
access_ttl_seconds = 604800


[mysql]
; Default server target for local development.
; To run against the us3 production VIP DB from this config, change
; active_server to 10.0.0.10 and env/log_level above as needed.
active_server = localhost
active_db_schema = jobs
port = 3306
pool_size = 2
pool_max_overflow = 2
pool_timeout = 30

; DaliJob-specific aliases for humans and future config consumers.
dalijob_db_schema = jobs
dalijob_local_server = localhost
dalijob_us3_server = 10.0.0.168
dalijob_us3_vip_server = 10.0.0.10
dalijob_us3_db_schema = jobs


[openai]
model = gpt-4.1-mini


[features]
resume_job_match = true
file_uploads = false
job_url_extraction = false
application_tracker = false
email_integration = false
calendar_integration = false


[documents]
storage_dir = ./storage/documents
