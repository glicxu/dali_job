; Copy this file to server/config.ini for local development.
; Keep secrets out of this file. Put DALIJOB_JWT_SECRET, OPENAI_API_KEY, and APIFY_API_TOKEN in server/.env.

[dali_job]
env = local
host = 127.0.0.1
port = 5010
log_level = debug
client_origins = http://localhost:3000,http://127.0.0.1:3000
; Use "local" for normal DaliJob register/login.
; Use "dev" only for no-token local debugging.
auth_mode = local

[mysql]
user = root
passwd = replace_with_local_password
active_server = localhost
active_db_schema = jobs
port = 3306
pool_size = 5
pool_max_overflow = 10
pool_timeout = 30

[dali_job_auth]
; JWT signing secret is read from DALIJOB_JWT_SECRET.
access_ttl_seconds = 604800

[documents]
; Local development file storage. This folder is ignored by git.
storage_dir = ./storage/documents

[openai]
model = gpt-4.1-mini

[provider_limits]
; In-process limits for OpenAI, Apify, and rendered web extraction calls.
user_per_minute = 20
ip_per_minute = 60
