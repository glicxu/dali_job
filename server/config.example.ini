; Copy this file to server/config.ini for local development.
; Keep secrets out of this file. Put OPENAI_API_KEY in server/.env.

[dali_job]
env = local
host = 127.0.0.1
port = 5010
log_level = debug
client_origins = http://localhost:3000,http://127.0.0.1:3000
; Use "local" for normal DaliJob register/login.
; Use "dev" only for no-token local debugging.
auth_mode = local

[mysql]
user = root
passwd = replace_with_local_password
active_server = localhost
active_db_schema = dali_job
port = 3306
pool_size = 5
pool_max_overflow = 10
pool_timeout = 30

[dali_job_auth]
; Keep the real value only in a private local/prod config.
; Use a long random value for production.
jwt_secret = change-me
access_ttl_seconds = 604800

[openai]
model = gpt-4.1-mini
